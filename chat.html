<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Support - City Prime Bank</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="mobile-container">
        <!-- Header -->
        <header class="header">
            <a href="dashboard.html" class="back-btn" style="color: var(--text-primary);">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div class="greeting" style="flex: 1; text-align: center;">
                <div class="greeting-name">Support Chat</div>
            </div>
            <div style="width: 40px;"></div>
        </header>

        <!-- Chat Container -->
        <div class="chat-container" id="chatContainer">
            <div class="chat-messages" id="chatMessages">
                <div class="message system">
                    <div class="message-bubble">
                        <p>Welcome to City Prime Bank Support! How can we help you today?</p>
                        <span class="message-time">Now</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chat Input -->
        <div class="chat-input-container">
            <form id="chatForm" class="chat-form">
                <button type="button" class="attach-btn" onclick="document.getElementById('fileInput').click()">
                    <i class="fas fa-paperclip"></i>
                </button>
                <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="handleFileUpload(event)">
                <input type="text" id="messageInput" class="chat-input" placeholder="Type your message..." autocomplete="off">
                <button type="submit" class="send-btn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </form>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="activity.html" class="nav-item">
                <i class="fas fa-chart-line"></i>
                <span>Activity</span>
            </a>
            <a href="send.html" class="nav-item">
                <i class="fas fa-paper-plane"></i>
                <span>Transfer</span>
            </a>
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>
            <a href="cards.html" class="nav-item">
                <i class="fas fa-credit-card"></i>
                <span>Cards</span>
            </a>
            <a href="profile.html" class="nav-item active">
                <i class="fas fa-user"></i>
                <span>Profile</span>
            </a>
        </nav>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        let chatId = null;
        let unsubscribe = null;

        // Check auth
        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                initChat(user.uid);
            }
        });

        async function initChat(userId) {
            try {
                // Check if chat exists
                const chatSnapshot = await db.collection('chats')
                    .where('userId', '==', userId)
                    .limit(1)
                    .get();
                
                if (chatSnapshot.empty) {
                    // Create new chat
                    const userDoc = await db.collection('users').doc(userId).get();
                    const userData = userDoc.data();
                    
                    const chatRef = await db.collection('chats').add({
                        userId: userId,
                        userName: `${userData.firstName} ${userData.lastName}`,
                        userEmail: userData.email,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        lastMessage: null,
                        lastMessageTime: firebase.firestore.FieldValue.serverTimestamp(),
                        unreadCount: 0
                    });
                    chatId = chatRef.id;
                } else {
                    chatId = chatSnapshot.docs[0].id;
                }
                
                loadMessages();
            } catch (error) {
                console.error('Error initializing chat:', error);
            }
        }

        function loadMessages() {
            if (unsubscribe) unsubscribe();
            
            unsubscribe = db.collection('chats')
                .doc(chatId)
                .collection('messages')
                .orderBy('timestamp', 'asc')
                .onSnapshot((snapshot) => {
                    snapshot.docChanges().forEach((change) => {
                        if (change.type === 'added') {
                            displayMessage(change.doc.data());
                        }
                    });
                    scrollToBottom();
                });
        }

        function displayMessage(message) {
            const container = document.getElementById('chatMessages');
            const isUser = message.senderId === currentUser.uid;
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'admin'}`;
            
            let content = '';
            if (message.imageUrl) {
                content = `<img src="${message.imageUrl}" class="message-image">`;
            }
            if (message.text) {
                content += `<p>${escapeHtml(message.text)}</p>`;
            }
            
            messageDiv.innerHTML = `
                <div class="message-bubble">
                    ${content}
                    <span class="message-time">${formatTime(message.timestamp)}</span>
                </div>
            `;
            
            container.appendChild(messageDiv);
            scrollToBottom();
        }

        function scrollToBottom() {
            const container = document.getElementById('chatMessages');
            container.scrollTop = container.scrollHeight;
        }

        document.getElementById('chatForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text || !chatId) return;
            
            input.value = '';
            
            try {
                await db.collection('chats')
                    .doc(chatId)
                    .collection('messages')
                    .add({
                        senderId: currentUser.uid,
                        senderName: userData ? `${userData.firstName} ${userData.lastName}` : 'User',
                        text: text,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        read: false
                    });
                
                await db.collection('chats').doc(chatId).update({
                    lastMessage: text,
                    lastMessageTime: firebase.firestore.FieldValue.serverTimestamp(),
                    unreadCount: firebase.firestore.FieldValue.increment(1)
                });
            } catch (error) {
                console.error('Error sending message:', error);
            }
        });

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file || !chatId) return;
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    await db.collection('chats')
                        .doc(chatId)
                        .collection('messages')
                        .add({
                            senderId: currentUser.uid,
                            senderName: userData ? `${userData.firstName} ${userData.lastName}` : 'User',
                            imageUrl: e.target.result,
                            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                            read: false
                        });
                    
                    await db.collection('chats').doc(chatId).update({
                        lastMessage: '📷 Image',
                        lastMessageTime: firebase.firestore.FieldValue.serverTimestamp(),
                        unreadCount: firebase.firestore.FieldValue.increment(1)
                    });
                } catch (error) {
                    console.error('Error uploading image:', error);
                }
            };
            reader.readAsDataURL(file);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }
    </script>

    <style>
        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 200px);
        }

        .chat-messages {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            max-width: 80%;
        }

        .message.system {
            align-self: center;
            max-width: 100%;
        }

        .message.user {
            align-self: flex-end;
        }

        .message.admin {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 16px;
            position: relative;
        }

        .message.system .message-bubble {
            background: var(--bg-card);
            text-align: center;
        }

        .message.user .message-bubble {
            background: var(--gradient-blue);
            border-bottom-right-radius: 4px;
        }

        .message.admin .message-bubble {
            background: var(--bg-card);
            border-bottom-left-radius: 4px;
        }

        .message-bubble p {
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 4px;
        }

        .message-image {
            max-width: 200px;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .message-time {
            font-size: 10px;
            opacity: 0.7;
        }

        .chat-input-container {
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
        }

        .chat-form {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .attach-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--bg-card);
            border: none;
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--gradient-blue);
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</body>
</html>
