<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Chat - City Prime Bank Admin</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="mobile-container">
        <!-- Header -->
        <header class="header">
            <a href="admin.html" class="back-btn" style="color: var(--text-primary);">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div class="greeting" style="flex: 1; text-align: center;">
                <div class="greeting-name">Support Chat</div>
            </div>
            <div style="width: 40px;"></div>
        </header>

        <!-- Chat List -->
        <div id="chatListSection">
            <div class="section">
                <h3 class="section-title">Active Chats</h3>
                <div class="chats-list" id="chatsList">
                    <div class="empty-state">
                        <i class="fas fa-spinner fa-spin"></i>
                        <span>Loading chats...</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chat View -->
        <div id="chatViewSection" class="hidden">
            <div class="chat-header">
                <button class="back-btn-small" onclick="backToChatList()">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div class="chat-user-info">
                    <div class="chat-avatar" id="chatUserAvatar">--</div>
                    <div>
                        <div class="chat-user-name" id="chatUserName">User</div>
                        <div class="chat-user-status"><span class="status-dot online"></span> Online</div>
                    </div>
                </div>
            </div>

            <div class="chat-messages" id="chatMessages"></div>

            <div class="chat-input-container">
                <form id="chatForm" class="chat-form">
                    <button type="button" class="attach-btn" onclick="document.getElementById('fileInput').click()">
                        <i class="fas fa-paperclip"></i>
                    </button>
                    <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="handleFileUpload(event)">
                    <input type="text" id="messageInput" class="chat-input" placeholder="Type your message..." autocomplete="off">
                    <button type="submit" class="send-btn">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        let allChats = [];
        let currentChatId = null;
        let currentChatData = null;
        let unsubscribeMessages = null;

        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                checkAdmin(user.uid);
            }
        });

        async function checkAdmin(uid) {
            const doc = await db.collection('users').doc(uid).get();
            if (!doc.exists || doc.data().role !== 'admin') {
                alert('Access denied');
                window.location.href = 'dashboard.html';
                return;
            }
            loadChats();
            
            // Check for user filter in URL
            const urlParams = new URLSearchParams(window.location.search);
            const userFilter = urlParams.get('user');
            if (userFilter) {
                setTimeout(() => openChatWithUser(userFilter), 500);
            }
        }

        function loadChats() {
            db.collection('chats')
                .orderBy('lastMessageTime', 'desc')
                .onSnapshot((snapshot) => {
                    allChats = [];
                    snapshot.forEach(doc => {
                        allChats.push({ id: doc.id, ...doc.data() });
                    });
                    renderChatList();
                });
        }

        function renderChatList() {
            const container = document.getElementById('chatsList');
            
            if (allChats.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <span>No active chats</span>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = allChats.map(chat => {
                const initials = chat.userName ? chat.userName.split(' ').map(n => n[0]).join('') : '?';
                const unread = chat.unreadCount > 0 ? `<span class="unread-badge">${chat.unreadCount}</span>` : '';
                
                return `
                    <div class="chat-item ${chat.unreadCount > 0 ? 'unread' : ''}" onclick="openChat('${chat.id}')">
                        <div class="chat-avatar">${initials}</div>
                        <div class="chat-info">
                            <div class="chat-name">${chat.userName || 'Unknown'}</div>
                            <div class="chat-preview">${chat.lastMessage || 'No messages'}</div>
                        </div>
                        <div class="chat-meta">
                            <div class="chat-time">${chat.lastMessageTime ? formatTime(chat.lastMessageTime) : ''}</div>
                            ${unread}
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function openChatWithUser(userId) {
            const chat = allChats.find(c => c.userId === userId);
            if (chat) {
                openChat(chat.id);
            } else {
                // Create new chat
                const userDoc = await db.collection('users').doc(userId).get();
                if (userDoc.exists) {
                    const userData = userDoc.data();
                    const chatRef = await db.collection('chats').add({
                        userId: userId,
                        userName: `${userData.firstName} ${userData.lastName}`,
                        userEmail: userData.email,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        lastMessageTime: firebase.firestore.FieldValue.serverTimestamp(),
                        unreadCount: 0
                    });
                    setTimeout(() => openChat(chatRef.id), 500);
                }
            }
        }

        async function openChat(chatId) {
            currentChatId = chatId;
            currentChatData = allChats.find(c => c.id === chatId);
            
            document.getElementById('chatListSection').classList.add('hidden');
            document.getElementById('chatViewSection').classList.remove('hidden');
            
            document.getElementById('chatUserAvatar').textContent = 
                currentChatData.userName ? currentChatData.userName.split(' ').map(n => n[0]).join('') : '?';
            document.getElementById('chatUserName').textContent = currentChatData.userName || 'Unknown';
            
            // Reset unread count
            await db.collection('chats').doc(chatId).update({ unreadCount: 0 });
            
            loadMessages();
        }

        function backToChatList() {
            if (unsubscribeMessages) unsubscribeMessages();
            currentChatId = null;
            currentChatData = null;
            document.getElementById('chatViewSection').classList.add('hidden');
            document.getElementById('chatListSection').classList.remove('hidden');
        }

        function loadMessages() {
            if (unsubscribeMessages) unsubscribeMessages();
            
            const container = document.getElementById('chatMessages');
            container.innerHTML = '';
            
            unsubscribeMessages = db.collection('chats')
                .doc(currentChatId)
                .collection('messages')
                .orderBy('timestamp', 'asc')
                .onSnapshot((snapshot) => {
                    snapshot.docChanges().forEach((change) => {
                        if (change.type === 'added') {
                            displayMessage(change.doc.data());
                        }
                    });
                    scrollToBottom();
                });
        }

        function displayMessage(message) {
            const container = document.getElementById('chatMessages');
            const isAdmin = message.senderId === currentUser.uid;
            
            const div = document.createElement('div');
            div.className = `message ${isAdmin ? 'admin-msg' : 'user-msg'}`;
            
            let content = '';
            if (message.imageUrl) {
                content = `<img src="${message.imageUrl}" class="message-image">`;
            }
            if (message.text) {
                content += `<p>${escapeHtml(message.text)}</p>`;
            }
            
            div.innerHTML = `
                <div class="message-bubble">
                    ${content}
                    <span class="message-time">${formatTime(message.timestamp)}</span>
                </div>
            `;
            
            container.appendChild(div);
        }

        function scrollToBottom() {
            const container = document.getElementById('chatMessages');
            container.scrollTop = container.scrollHeight;
        }

        document.getElementById('chatForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text || !currentChatId) return;
            
            input.value = '';
            
            try {
                await db.collection('chats')
                    .doc(currentChatId)
                    .collection('messages')
                    .add({
                        senderId: currentUser.uid,
                        senderName: 'City Prime Support',
                        text: text,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        read: false
                    });
                
                await db.collection('chats').doc(currentChatId).update({
                    lastMessage: text,
                    lastMessageTime: firebase.firestore.FieldValue.serverTimestamp()
                });
            } catch (error) {
                console.error('Error sending message:', error);
            }
        });

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file || !currentChatId) return;
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    await db.collection('chats')
                        .doc(currentChatId)
                        .collection('messages')
                        .add({
                            senderId: currentUser.uid,
                            senderName: 'City Prime Support',
                            imageUrl: e.target.result,
                            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                            read: false
                        });
                    
                    await db.collection('chats').doc(currentChatId).update({
                        lastMessage: '📷 Image',
                        lastMessageTime: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } catch (error) {
                    console.error('Error uploading image:', error);
                }
            };
            reader.readAsDataURL(file);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }
    </script>

    <style>
        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .chats-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
        }

        .chat-item.unread {
            border-left: 3px solid var(--primary);
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            background: var(--gradient-blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-size: 14px;
            font-weight: 600;
        }

        .chat-preview {
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 150px;
        }

        .chat-meta {
            text-align: right;
        }

        .chat-time {
            font-size: 11px;
            color: var(--text-muted);
        }

        .unread-badge {
            display: inline-block;
            background: var(--primary);
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: 4px;
        }

        .chat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }

        .back-btn-small {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--bg-card);
            border: none;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .chat-user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-user-name {
            font-size: 16px;
            font-weight: 600;
        }

        .chat-user-status {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chat-messages {
            height: calc(100vh - 200px);
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            max-width: 80%;
        }

        .message.user-msg {
            align-self: flex-start;
        }

        .message.admin-msg {
            align-self: flex-end;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 16px;
        }

        .user-msg .message-bubble {
            background: var(--bg-card);
            border-bottom-left-radius: 4px;
        }

        .admin-msg .message-bubble {
            background: var(--gradient-blue);
            border-bottom-right-radius: 4px;
        }

        .message-image {
            max-width: 200px;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .message-time {
            font-size: 10px;
            opacity: 0.7;
        }

        .chat-input-container {
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
        }

        .chat-form {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .attach-btn, .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--bg-card);
            border: none;
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
        }

        .send-btn {
            background: var(--gradient-blue);
            color: white;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--primary);
        }
    </style>
</body>
</html>
