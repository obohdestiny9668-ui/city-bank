<!-- activity.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity - City Prime Bank</title>
    <link rel="stylesheet" href="activity.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <!-- Status Bar -->
    <div class="status-bar">
        <div class="time" id="clock">7:01</div>
        <div class="status-icons">
            <i class="fas fa-signal"></i>
            <i class="fas fa-wifi"></i>
            <i class="fas fa-battery-full"></i>
        </div>
    </div>

    <!-- Header -->
    <header class="header">
        <button class="back-btn" onclick="history.back()">
            <i class="fas fa-arrow-left"></i>
        </button>
        <h1>Activity</h1>
        <button class="icon-btn" onclick="toggleTheme()">
            <i class="fas fa-sun"></i>
        </button>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Filter Tabs -->
        <div class="filter-tabs">
            <button class="tab active" onclick="filterActivity('all')">All</button>
            <button class="tab" onclick="filterActivity('credit')">Credit</button>
            <button class="tab" onclick="filterActivity('debit')">Debit</button>
        </div>

        <!-- Search -->
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search transactions..." id="searchInput" onkeyup="searchTransactions()">
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="loading-state">
            <div class="loading-spinner"></div>
            <p>Loading transactions...</p>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state hidden">
            <i class="fas fa-receipt"></i>
            <h3>No Transactions Yet</h3>
            <p>Your transaction history will appear here</p>
        </div>

        <!-- Transaction Sections -->
        <div id="transactionSections">
            <!-- Today Section -->
            <div class="date-section" id="todaySection">
                <h3>Today</h3>
                <div class="transaction-list" id="todayList"></div>
            </div>

            <!-- Yesterday Section -->
            <div class="date-section" id="yesterdaySection">
                <h3>Yesterday</h3>
                <div class="transaction-list" id="yesterdayList"></div>
            </div>

            <!-- This Week Section -->
            <div class="date-section" id="thisWeekSection">
                <h3>This Week</h3>
                <div class="transaction-list" id="thisWeekList"></div>
            </div>

            <!-- This Month Section -->
            <div class="date-section" id="thisMonthSection">
                <h3>This Month</h3>
                <div class="transaction-list" id="thisMonthList"></div>
            </div>

            <!-- Older Section -->
            <div class="date-section" id="olderSection">
                <h3>Older</h3>
                <div class="transaction-list" id="olderList"></div>
            </div>
        </div>

        <!-- Summary Cards -->
        <div class="date-section" id="summarySection">
            <h3>Summary</h3>
            <div class="summary-cards">
                <div class="summary-card credit">
                    <i class="fas fa-arrow-down"></i>
                    <span>Total Credit</span>
                    <strong id="totalCredit">$0.00</strong>
                </div>
                <div class="summary-card debit">
                    <i class="fas fa-arrow-up"></i>
                    <span>Total Debit</span>
                    <strong id="totalDebit">$0.00</strong>
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="activity.html" class="nav-item active">
            <div class="nav-icon">
                <i class="fas fa-chart-line"></i>
            </div>
            <span>Activity</span>
        </a>
        <a href="send.html" class="nav-item">
            <i class="fas fa-paper-plane"></i>
            <span>Transfer</span>
        </a>
        <a href="dashboard.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="cards.html" class="nav-item">
            <i class="fas fa-credit-card"></i>
            <span>Cards</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>

    <script src="firebase-config.js"></script>
    <script src="activity.js"></script>
</body>
</html>
