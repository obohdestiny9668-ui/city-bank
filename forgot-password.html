<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - City Prime Bank</title>

<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="auth.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

</head>
<body>

<div class="mobile-container">

<!-- Header -->
<div class="auth-header">
<a href="login.html" class="back-btn">
<i class="fas fa-arrow-left"></i>
</a>

<div class="auth-logo">
<i class="fas fa-university"></i>
<span>City Prime Bank</span>
</div>

<div class="spacer"></div>
</div>


<!-- CONTENT -->
<div class="auth-content">

<div class="auth-icon">
<i class="fas fa-key"></i>
</div>

<h1 class="auth-title">Reset Password</h1>
<p class="auth-subtitle">Enter your email to receive a reset code</p>


<form id="resetForm" class="auth-form">

<div class="form-group">
<label class="form-label">Email Address</label>

<div class="input-wrapper">
<i class="fas fa-envelope"></i>

<input 
type="email"
id="email"
class="form-input"
placeholder="Enter your email"
required
>

</div>
</div>


<button type="submit" class="btn btn-primary btn-block">
<i class="fas fa-paper-plane"></i> Request Reset Link
</button>

</form>


<div class="auth-divider">
<span>Remember your password?</span>
</div>

<p class="auth-footer">
<a href="login.html">Back to Login</a>
</p>

</div>

</div>



<!-- LOADING -->
<div id="loadingOverlay" class="loading-overlay hidden">
<div class="loading-spinner"></div>
<p>Sending reset link...</p>
</div>



<script src="firebase-config.js"></script>

<script>

document.getElementById("resetForm").addEventListener("submit", async (e) => {

e.preventDefault();

const email = document.getElementById("email").value;

document.getElementById("loadingOverlay").classList.remove("hidden");

try{

await auth.sendPasswordResetEmail(email);

document.getElementById("loadingOverlay").classList.add("hidden");

showToast("Password reset link sent to your email.", "success");

}catch(error){

document.getElementById("loadingOverlay").classList.add("hidden");

let message = "Something went wrong.";

if(error.code === "auth/user-not-found"){
message = "No account found with this email.";
}

if(error.code === "auth/invalid-email"){
message = "Invalid email address.";
}

showToast(message,"error");

}

});

</script>

</body>
</html>
